name: Sync GitHub assets

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: jondmarien
          outputs: |
            public/github/snake.svg
            public/github/snake-dark.svg?palette=github-dark

      - name: Sync contributions JSON
        run: bun run sync:github

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync GitHub contribution assets'
          file_pattern: public/github/*
